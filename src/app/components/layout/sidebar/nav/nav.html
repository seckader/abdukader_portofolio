<nav class="nav" [attr.aria-label]="'nav.label' | translate">
  <button
    *ngFor="let section of sections"
    class="nav__link mono"
    #navLink
    type="button"
    cursorHover
    [class.active]="activeSection === section.id"
    [attr.aria-current]="activeSection === section.id ? 'true' : null"
    (click)="goToSection(section.id)">
    <span class="nav__indicator"></span>
    <span class="nav__text">{{ section.labelKey | translate }}</span>
  </button>
</nav>
