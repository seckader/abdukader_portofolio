<div class="sidebar">

  <!-- MOBILE : header fixe en haut (pas de hamburger) -->
  <div class="sidebar__mobile-header">
    <div class="sidebar__mobile-intro">
      <a class="sidebar__mobile-name" href="#about" #sidebarIntro>
        {{ 'sidebar.name' | translate }}
      </a>
      <p class="sidebar__mobile-title" #sidebarIntro>{{ 'sidebar.title' | translate }}</p>
    </div>

    <div class="sidebar__mobile-actions">
      <app-social-links />
      <button class="sidebar__lang mono" type="button" (click)="switchLanguage()">
        <span [class.active]="currentLang === 'fr'">FR</span>
        <span>/</span>
        <span [class.active]="currentLang === 'en'">EN</span>
      </button>
    </div>
  </div>

  <!-- DESKTOP : sidebar fixe à gauche (inchangée) -->
  <div class="sidebar__panel">
    <div class="sidebar__intro">
      <a class="sidebar__name" href="#about" #sidebarIntro>
        {{ 'sidebar.name' | translate }}
      </a>
      <p class="sidebar__title" #sidebarIntro>{{ 'sidebar.title' | translate }}</p>
      <p class="sidebar__tagline" #sidebarIntro>{{ 'sidebar.tagline' | translate }}</p>
    </div>

    <app-nav [activeSection]="activeSection" />

    <div class="sidebar__footer">
      <app-social-links />
      <button class="sidebar__lang mono" type="button" (click)="switchLanguage()">
        <span [class.active]="currentLang === 'fr'">FR</span>
        <span>/</span>
        <span [class.active]="currentLang === 'en'">EN</span>
      </button>
    </div>
  </div>

</div>
