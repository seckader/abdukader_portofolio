<div class="layout">
  <aside class="layout__sidebar" #sidebarEntry>
    <app-sidebar />
  </aside>

  <main class="layout__content" aria-label="Portfolio">
    <app-main-content>
      <section id="about" class="content-section" [attr.aria-label]="'about.ariaLabel' | translate" #sectionEntry>
        <app-about />
      </section>

      <section id="experience" class="content-section" [attr.aria-label]="'experience.ariaLabel' | translate" #sectionEntry>
        <app-experience />
      </section>

      <section id="skills" class="content-section" [attr.aria-label]="'skills.ariaLabel' | translate" #sectionEntry>
        <app-skills />
      </section>

      <section id="projects" class="content-section" [attr.aria-label]="'projects.ariaLabel' | translate" #sectionEntry>
        <app-projects />
      </section>

      <section id="blog" class="content-section" #sectionEntry>
        <span class="content-section__eyebrow mono">05</span>
        <h2>{{ 'sections.blog.title' | translate }}</h2>
        <p>{{ 'sections.blog.placeholder' | translate }}</p>
      </section>

      <section id="contact" class="content-section" #sectionEntry>
        <span class="content-section__eyebrow mono">06</span>
        <h2>{{ 'sections.contact.title' | translate }}</h2>
        <p>{{ 'sections.contact.placeholder' | translate }}</p>
      </section>
    </app-main-content>
  </main>
</div>
